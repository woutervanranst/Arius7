name: 📊 Representative Benchmark

on:
  # push:
  #   branches: ["**"]
  #   paths:
  #     - "src/Arius.Core/**"
  #     - "src/Arius.Benchmarks/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    name: 📊 Representative Benchmark
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: 📊 Run representative benchmark
        run: dotnet run -c Release --project src/Arius.Benchmarks

      - name: 📝 Commit benchmark output
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/Arius.Benchmarks/benchmark-tail.md src/Arius.Benchmarks/raw

          if git diff --cached --quiet; then
            echo "No benchmark output changes to commit."
            exit 0
          fi

          git commit -m "chore: append CI benchmark results"
          git push
