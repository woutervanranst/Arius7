name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/Arius.slnx

      - name: Build
        run: dotnet build src/Arius.slnx --no-restore -c Release

      - name: Test
        run: >
          dotnet test src/Arius.slnx
          --no-build
          -c Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
        env:
          ARIUS_E2E_ACCOUNT: ${{ vars.ARIUS_E2E_ACCOUNT }}
          ARIUS_E2E_KEY: ${{ secrets.ARIUS_E2E_KEY }}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: src/Arius.Core.Tests/coverage.cobertura.xml,src/Arius.Integration.Tests/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
