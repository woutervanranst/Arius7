name: ✅ CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: 📦 Restore dependencies
        run: dotnet restore src/Arius.slnx

      - name: 🔨 Build
        run: dotnet build src/Arius.slnx --no-restore -c Release

      - name: 📊 Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: 🧪 Run tests
        run: >
          dotnet-coverage collect
          --output coverage.cobertura.xml
          --output-format cobertura
          "dotnet test --solution src/Arius.slnx --no-build -c Release --report-trx --results-directory testresults"
        env:
          ARIUS_E2E_ACCOUNT: ${{ vars.ARIUS_E2E_ACCOUNT }}
          ARIUS_E2E_KEY: ${{ secrets.ARIUS_E2E_KEY }}

      - name: 📋 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: testresults/**/*.trx

      - name: 📈 Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
