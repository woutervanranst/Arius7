name: ✅ CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test & Coverage (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: linux
            collect_coverage: true
          - os: macos-latest
            runner: macos
            # GitHub-hosted macOS runners are arm64. dotnet-coverage dynamic
            # instrumentation supports macOS x64, but not macOS arm64, so this
            # job skips coverage on macOS rather than uploading an unusable report.
            collect_coverage: false
          - os: windows-latest
            runner: windows
            collect_coverage: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: 🔎 Discover test projects
        id: discover
        shell: pwsh
        run: ./.github/scripts/Get-DotNetProjectMatrix.ps1 -RunnerOs '${{ matrix.runner }}' -Mode test

      - name: 📦 Restore dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projects = '${{ steps.discover.outputs.projects }}' | ConvertFrom-Json
          foreach ($project in $projects) {
            dotnet restore $project
          }

      - name: 🔨 Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projects = '${{ steps.discover.outputs.projects }}' | ConvertFrom-Json
          foreach ($project in $projects) {
            dotnet build $project --no-restore -c Release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: 📊 Install dotnet-coverage
        if: ${{ matrix.collect_coverage }}
        run: dotnet tool install --global dotnet-coverage

      - name: 🧪 Run tests with coverage
        if: ${{ matrix.collect_coverage }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projects = '${{ steps.discover.outputs.projects }}' | ConvertFrom-Json
          foreach ($project in $projects) {
            $coverageFile = [System.IO.Path]::GetFileNameWithoutExtension($project) + '.coverage.cobertura.xml'
            dotnet-coverage collect --output $coverageFile --output-format cobertura "dotnet test --project $project --no-build -c Release"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        env:
          ARIUS_E2E_ACCOUNT: ${{ vars.ARIUS_E2E_ACCOUNT }}
          ARIUS_E2E_KEY: ${{ secrets.ARIUS_E2E_KEY }}

      - name: 🧪 Run tests
        if: ${{ !matrix.collect_coverage }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projects = '${{ steps.discover.outputs.projects }}' | ConvertFrom-Json
          foreach ($project in $projects) {
            dotnet test --project $project --no-build -c Release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        env:
          ARIUS_E2E_ACCOUNT: ${{ vars.ARIUS_E2E_ACCOUNT }}
          ARIUS_E2E_KEY: ${{ secrets.ARIUS_E2E_KEY }}

      - name: 📈 Upload coverage to Codecov
        if: ${{ always() && matrix.collect_coverage }}
        uses: codecov/codecov-action@v7
        with:
          files: '*.coverage.cobertura.xml'
          flags: ${{ matrix.runner }}
          name: coverage-${{ matrix.runner }}
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: 🎭 Playwright e2e
    # PRs + master push (+ release tags, so release.yml's called CI gates the image on e2e)
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Arius.Web

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Arius.Web/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run e2e
        run: npm run e2e
        env:
          ARIUS_E2E_ACCOUNT: ${{ vars.ARIUS_E2E_ACCOUNT }}
          ARIUS_E2E_KEY: ${{ secrets.ARIUS_E2E_KEY }}
          ARIUS_E2E_CONTAINER: ${{ vars.ARIUS_E2E_CONTAINER }}
          ARIUS_E2E_PASSPHRASE: ${{ secrets.ARIUS_E2E_PASSPHRASE }}
          ARIUS_E2E_ALIAS: ${{ vars.ARIUS_E2E_ALIAS }}
          ARIUS_E2E_TIER: ${{ vars.ARIUS_E2E_TIER }}
          ARIUS_E2E_WRITE: "1"

      - name: ⬆️ Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: src/Arius.Web/e2e/playwright-report
          retention-days: 7

  web-unit:
    name: 🧪 Web unit (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Arius.Web
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Arius.Web/package-lock.json
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧪 Vitest with coverage
        run: npm run test:coverage
      - name: 📈 Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v7
        with:
          files: src/Arius.Web/coverage/lcov.info
          flags: web
          name: coverage-web
          token: ${{ secrets.CODECOV_TOKEN }}

  web-e2e-hermetic:
    name: 🎭 Web e2e (hermetic, scripted Core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Arius.Web
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Arius.Web/package-lock.json
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🌐 Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: 🎭 Run hermetic e2e
        run: npm run e2e:hermetic
      - name: ⬆️ Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-hermetic
          path: src/Arius.Web/e2e/hermetic/playwright-report
          retention-days: 7
