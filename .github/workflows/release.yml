name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained
        run: >
          dotnet publish src/Arius.Cli/Arius.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish
          -p:Version=${{ steps.version.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Download previous release
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --channel ${{ matrix.rid }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          -u Arius
          -v ${{ steps.version.outputs.version }}
          -p publish
          -e Arius.Cli${{ matrix.rid == 'win-x64' && '.exe' || '' }}
          --channel ${{ matrix.rid }}

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --channel ${{ matrix.rid }}
          --publish
          --releaseName "Arius ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
