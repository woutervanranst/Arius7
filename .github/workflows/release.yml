name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained
        run: >
          dotnet publish src/Arius.Cli/Arius.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish
          -p:Version=${{ steps.version.outputs.version }}

      - name: Create archive
        shell: bash
        run: |
          cd publish
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a -tzip ../arius-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip .
          else
            tar czf ../arius-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.rid }}
          path: arius-${{ steps.version.outputs.version }}-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: archive-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "Arius ${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*
