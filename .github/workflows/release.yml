name: 🚀 Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: write
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    name: 📦 Build (${{ matrix.rid }})
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: 🏷️ Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 🔨 Publish self-contained binary
        run: >
          dotnet publish src/Arius.Cli/Arius.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none

      - name: ✏️ Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv publish/Arius.Cli.exe arius-${{ matrix.rid }}.exe
          else
            mv publish/Arius.Cli arius-${{ matrix.rid }}
          fi

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.rid }}
          path: arius-${{ matrix.rid }}*

  docker:
    name: 🐳 Build & push image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7

      - name: 🏷️ Extract version + image tags from tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Stable tags also get :latest; pre-release tags (e.g. v1.2.3-beta) get :latest-beta instead.
          tags="woutervanranst/ariusweb:$version"
          if [[ "$version" != *-* ]]; then
            tags="$tags"$'\n'"woutervanranst/ariusweb:latest"
          else
            tags="$tags"$'\n'"woutervanranst/ariusweb:latest-beta"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🛠️ Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-recovery-script:
    name: 🔓 Verify recovery script
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7

      - name: 🐍 Install Python recovery dependencies
        run: pip install cryptography zstandard

      - name: 🔑 Decrypt GCM golden file and verify output
        run: |
          GOLDEN="src/Arius.Core.Tests/Encryption/GoldenFiles/2594868716c414b39895e10299bc609a1d1602a65b8576599d149f911aa33be8"
          PASSPHRASE="wouter"
          EXPECTED="Hello, ArGCM1 golden file!"

          ACTUAL=$(python3 recover-chunk.py "$GOLDEN" "$PASSPHRASE")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "❌ Recovery mismatch!" >&2
            echo "  expected: $EXPECTED" >&2
            echo "  actual:   $ACTUAL" >&2
            exit 1
          fi
          echo "✅ GCM recovery script output matches expected plaintext."

      - name: 🔑 Decrypt GCM+zstd golden file and verify output
        run: |
          GOLDEN="src/Arius.Core.Tests/Encryption/GoldenFiles/b886c2f18e3a1be5bfef76821ca1751126c6534ac267dd539cbbabe09801682f"
          PASSPHRASE="wouter"
          EXPECTED="Hello, zstd golden file!"

          ACTUAL=$(python3 recover-chunk.py "$GOLDEN" "$PASSPHRASE")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "❌ zstd recovery mismatch!" >&2
            echo "  expected: $EXPECTED" >&2
            echo "  actual:   $ACTUAL" >&2
            exit 1
          fi
          echo "✅ GCM+zstd recovery script output matches expected plaintext (current format)."

      - name: 🔑 Decrypt CBC golden file and verify output
        run: |
          GOLDEN="src/Arius.Core.Tests/Encryption/GoldenFiles/680ccc692b5c2b058a0d9964ae08f9343350f8873dd900bb62742ba0a0b313de"
          PASSPHRASE="wouter"
          EXPECTED="Hello, Salted__ CBC golden file!"

          ACTUAL=$(python3 recover-chunk.py "$GOLDEN" "$PASSPHRASE")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "❌ CBC recovery mismatch!" >&2
            echo "  expected: $EXPECTED" >&2
            echo "  actual:   $ACTUAL" >&2
            exit 1
          fi
          echo "✅ CBC recovery script output matches expected plaintext."

  release:
    name: 🎉 Publish Release
    needs: [build, verify-recovery-script, docker]
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🏷️ Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Compute release-notes range
        id: notes
        shell: bash
        env:
          # Tag names are attacker-controllable. Validate to a safe charset before the
          # value reaches git-cliff-action, which splices `args` straight into a shell
          # `run:` line — see the GitHub script-injection guidance.
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$REF_NAME" =~ ^v[0-9][0-9A-Za-z.+_-]*$ ]]; then
            echo "❌ Unexpected tag format: $REF_NAME" >&2
            exit 1
          fi
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

          # Release notes cover everything since the last non-beta (stable) release in
          # this tag's ancestry: for a beta tag that's the last stable before it; for a
          # stable tag that's the previous stable. `git describe` walks the commit graph,
          # so this stays correct even when stable and beta tags sit on divergent branches.
          # --exclude='*-*' skips pre-release tags (the hyphen in e.g. v1.2.3-beta).
          prev_stable=$(git describe --tags --abbrev=0 --match='v[0-9]*' --exclude='*-*' "${REF_NAME}^" 2>/dev/null || true)
          if [[ "$prev_stable" =~ ^v[0-9][0-9A-Za-z.+_-]*$ ]]; then
            echo "range=${prev_stable}..${REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "Release notes range: ${prev_stable}..${REF_NAME}"
          else
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "No prior stable release found; generating notes from full history."
          fi

      - name: 📝 Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # One consolidated section spanning everything since the last stable release:
          # --ignore-tags drops pre-release (hyphenated) tags so intermediate betas don't
          # split the notes into separate sections, and --tag labels the section with this
          # tag (a beta tag is itself ignored, so --tag is what names the section).
          args: --strip header --ignore-tags 'v[0-9].*-' --tag ${{ steps.notes.outputs.tag }} ${{ steps.notes.outputs.range }}
        env:
          OUTPUT: CHANGELOG.md

      - name: ⬇️ Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: binary-*
          merge-multiple: true

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Move tag-derived (attacker-controllable) context into env vars and quote on use, so a
          # crafted tag name can't inject shell — see the GitHub script-injection guidance.
          VERSION: ${{ steps.version.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Mark pre-release tags (e.g. v1.2.3-beta) as GitHub pre-releases.
          prerelease=""
          if [[ "$VERSION" == *-* ]]; then prerelease="--prerelease"; fi
          gh release create "$REF_NAME" \
            --repo "$REPO" \
            --title "Arius $VERSION" \
            --notes-file CHANGELOG.md \
            $prerelease \
            dist/*

      - name: 🔄 Trigger verify-self-update workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run verify-self-update.yml \
            --repo ${{ github.repository }} \
            --ref master