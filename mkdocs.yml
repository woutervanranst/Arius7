site_name: Arius
site_description: A lightweight, tiered archival solution for Azure Blob Storage — architecture, decisions, and guides.
site_url: https://woutervanranst.github.io/Arius7/
repo_url: https://github.com/woutervanranst/Arius7
repo_name: woutervanranst/Arius7
edit_uri: edit/master/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.indexes      # README.md / index.md is the section landing page
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

# Build-quality gates. `mkdocs build --strict` (used in CI) turns warnings into
# errors, so broken in-tree links and anchors fail the build.
validation:
  nav:
    omitted_files: info        # history/** and the ADR template are deliberately not in nav
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    unrecognized_links: warn

# Frozen archaeology + the ADR template are built (searchable, linkable) but kept
# out of the navigation tree.
not_in_nav: |
  /history/**
  /decisions/adr-template.md

nav:
  - Home: README.md
  - Guides:
      - guide/hosts.md
      - guide/cli.md
      - guide/web-ui.md
      - guide/explorer.md
      - guide/deployment.md
      - guide/development.md
  - Design:
      - design/README.md
      - design/migration.md
      - Core — Features:
          - design/core/features/archive-command.md
          - design/core/features/restore-command.md
          - design/core/features/list-query.md
          - design/core/features/repair-chunk-index.md
          - design/core/features/queries.md
      - Core — Shared:
          - design/core/shared/chunk-index.md
          - design/core/shared/chunk-storage.md
          - design/core/shared/filetree.md
          - design/core/shared/hashcache.md
          - design/core/shared/snapshot.md
          - design/core/shared/storage.md
          - design/core/shared/cost.md
          - design/core/shared/encryption.md
          - design/core/shared/compression.md
          - design/core/shared/filesystem.md
          - design/core/shared/hashes.md
          - design/core/shared/streaming.md
      - Hosts:
          - design/hosts/cli.md
          - design/hosts/explorer.md
          - design/hosts/web.md
      - Cross-cutting:
          - design/cross-cutting/events-and-progress.md
          - design/cross-cutting/service-lifetimes.md
          - design/cross-cutting/memory-boundedness.md
          - design/cross-cutting/performance.md
          - design/cross-cutting/logging.md
          - design/cross-cutting/testing.md
  - Decisions:
      - decisions/README.md
      - decisions/adr-0001-structure-representative-e2e-coverage.md
      - decisions/adr-0002-skip-snapshots-for-no-op-archives.md
      - decisions/adr-0003-use-distinct-typed-hashes.md
      - decisions/adr-0004-split-filetree-entry-hash-identities.md
      - decisions/adr-0005-adopt-scoped-stryker-mutation-testing.md
      - decisions/adr-0006-build-filetrees-from-hashed-directory-staging.md
      - decisions/adr-0007-separate-phase-and-detail-logging-in-pipeline-handlers.md
      - decisions/adr-0008-introduce-internal-filesystem-domain-types.md
      - decisions/adr-0009-clarify-test-fixture-boundaries.md
      - decisions/adr-0010-use-feature-handlers-for-application-use-cases.md
      - decisions/adr-0011-require-90-percent-production-line-coverage.md
      - decisions/adr-0012-zstd-as-new-compression-algorithm.md
      - decisions/adr-0013-core-host-separation.md
      - decisions/adr-0014-encryption-format-and-recoverability.md
      - decisions/adr-0015-chunk-index-scalability.md
      - decisions/adr-0016-multi-machine-cache-coherence.md
      - decisions/adr-0017-idempotent-non-distributed-recovery.md
      - decisions/adr-0018-archive-tier-metadata-sidecar.md
      - decisions/adr-0019-central-file-exclusion-configuration.md
      - decisions/adr-0020-provider-agnostic-cost-estimation.md
      - decisions/adr-0021-opt-in-change-detection-hashcache.md
  - Glossary: glossary.md
  - History: history/INDEX.md
