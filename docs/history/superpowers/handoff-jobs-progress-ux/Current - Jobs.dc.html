<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Arius — Current Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="assets/keenicons/styles.bundle.css" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; height:100%; background:#f4f4f5; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
    * { box-sizing:border-box; }
    button { font-family:inherit; border:none; background:none; cursor:pointer; padding:0; }
  </style>
</helmet>

<div style="position:relative;height:100vh;overflow:hidden;background:#f4f4f5" data-screen-label="Jobs page (current)">

  <!-- Icon rail -->
  <aside style="position:fixed;top:0;bottom:0;left:0;z-index:20;display:flex;flex-direction:column;align-items:center;background:#f4f4f5;padding:16px 0;width:86px">
    <img src="assets/arius-iceberg.svg" alt="Arius" style="width:38px;height:38px;border-radius:10px">
    <nav style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:20px">
      <a href="#" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#71717a;border:1px solid transparent;width:64px;height:62px;border-radius:13px;text-decoration:none">
        <i class="ki-filled ki-element-11" style="font-size:21px"></i>
        <span style="font-size:10.5px;font-weight:600;line-height:1">Overview</span>
      </a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#71717a;border:1px solid transparent;width:64px;height:62px;border-radius:13px;text-decoration:none">
        <i class="ki-filled ki-folder" style="font-size:21px"></i>
        <span style="font-size:10.5px;font-weight:600;line-height:1">Repos</span>
      </a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#3b82f6;background:#fff;border:1px solid #ececef;box-shadow:0 1px 2px rgba(0,0,0,.05);width:64px;height:62px;border-radius:13px;text-decoration:none">
        <i class="ki-filled ki-technology-2" style="font-size:21px"></i>
        <span style="font-size:10.5px;font-weight:600;line-height:1">Jobs</span>
      </a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#71717a;border:1px solid transparent;width:64px;height:62px;border-radius:13px;text-decoration:none">
        <i class="ki-filled ki-setting-2" style="font-size:21px"></i>
        <span style="font-size:10.5px;font-weight:600;line-height:1">Settings</span>
      </a>
    </nav>
    <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:16px">
      <i class="ki-filled ki-notification-status" style="font-size:20px;color:#a1a1aa"></i>
      <div style="position:relative">
        <div style="width:40px;height:40px;border-radius:9999px;background:linear-gradient(135deg,#0091e1,#5bd6fd)"></div>
        <span style="position:absolute;right:0;bottom:0;width:10px;height:10px;border-radius:9999px;background:#22c55e;border:2px solid #f4f4f5"></span>
      </div>
      <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:#a1a1aa">v7.2.1</span>
    </div>
  </aside>

  <!-- Floating content card -->
  <div style="display:flex;flex-direction:column;overflow:hidden;background:#fff;position:absolute;top:14px;right:14px;bottom:14px;left:100px;border:1px solid #e4e4e7;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)">
    <header style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:0 24px;height:64px;border-bottom:1px solid #f0f0f2">
      <div style="font-size:14px">
        <span style="color:#a1a1aa">Arius</span>
        <span style="color:#d4d4d8;margin:0 6px">›</span>
        <span style="color:#27272a;font-weight:600">Jobs</span>
      </div>
      <button style="display:flex;align-items:center;gap:8px;padding:0 12px;width:300px;height:38px;background:#f4f4f5;border-radius:9px;color:#71717a;cursor:text">
        <i class="ki-filled ki-magnifier" style="font-size:16px"></i>
        <span style="flex:1;text-align:left;font-size:13.5px">Search files across repositories…</span>
        <kbd style="font-size:11px;padding:2px 6px;border-radius:4px;background:#fff;border:1px solid #e4e4e7;color:#a1a1aa;font-family:inherit">⌘K</kbd>
      </button>
    </header>

    <main style="flex:1;overflow-y:auto;padding:24px 26px 36px">
      <!-- Heading -->
      <div style="display:flex;align-items:center;gap:12px">
        <h1 style="margin:0;font-size:22px;font-weight:700;letter-spacing:-.02em;color:#18181b">Jobs</h1>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:999px;padding:3px 10px;background:#eff6ff;color:#1d4ed8">2 running</span>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:999px;padding:3px 10px;background:#f5f3ff;color:#6d28d9">1 scheduled</span>
      </div>

      <!-- Jobs table -->
      <div style="margin-top:20px;background:#fff;border:1px solid #ececef;border-radius:13px;box-shadow:0 1px 2px rgba(0,0,0,.04);padding:0;overflow:hidden">
        <div style="display:grid;grid-template-columns:2.2fr 1.5fr 1fr 1.5fr;padding:11px 20px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a1a1aa">
          <div>Job</div><div>Trigger</div><div>Status</div><div>Progress</div>
        </div>
        <sc-for list="{{ jobs }}" as="job" hint-placeholder-count="5">
          <div style="display:grid;grid-template-columns:2.2fr 1.5fr 1fr 1.5fr;align-items:center;padding:12px 20px;border-top:1px solid #f6f6f7;opacity:{{ job.opacity }}">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:{{ job.iconBg }};color:{{ job.iconColor }}">
                <i class="ki-filled {{ job.icon }}" style="font-size:16px"></i>
              </div>
              <div>
                <div style="font-size:13.5px;font-weight:600;color:#27272a">{{ job.repo }}</div>
                <div style="font-size:12px;color:#a1a1aa;text-transform:capitalize">{{ job.kind }}</div>
              </div>
            </div>
            <div style="font-size:13px;color:#52525b;text-transform:capitalize">
              <i class="ki-filled {{ job.triggerIcon }}" style="color:#a1a1aa;margin-right:5px"></i>{{ job.trigger }}
            </div>
            <div>
              <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:999px;padding:3px 10px;color:{{ job.statusColor }};background:{{ job.statusBg }}">
                <i class="ki-filled {{ job.statusIcon }}" style="font-size:12px"></i>{{ job.statusLabel }}
              </span>
            </div>
            <div>
              <div style="height:5px;background:#eef0f3;border-radius:999px;overflow:hidden;max-width:160px">
                <div style="height:100%;background:#3b82f6;width:{{ job.pct }}%"></div>
              </div>
              <div style="font-size:11.5px;color:#a1a1aa;margin-top:4px">{{ job.detail }}</div>
            </div>
          </div>
        </sc-for>
      </div>

      <!-- Live output -->
      <div style="margin-top:18px">
        <div style="font-size:13px;font-weight:600;color:#3f3f46;margin-bottom:8px">Live output</div>
        <div style="background:#0b0b0f;border-radius:10px;padding:12px 14px;overflow-y:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55;height:300px">
          <sc-for list="{{ consoleLines }}" as="l" hint-placeholder-count="12">
            <div style="white-space:pre-wrap"><span style="color:#52525b">{{ l.ts }}</span><span style="color:{{ l.color }}"> {{ l.text }}</span></div>
          </sc-for>
        </div>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1600, &quot;height&quot;: 1000}}">
class Component extends DCLogic {
  renderVals() {
    return {
      jobs: [
        { repo: 'photos', kind: 'archive', icon: 'ki-cloud-add', iconBg: '#eff6ff', iconColor: '#3b82f6', trigger: 'one-off', triggerIcon: 'ki-flash-circle', statusLabel: 'Running', statusColor: '#1d4ed8', statusBg: '#eff6ff', statusIcon: 'ki-loading', pct: 95, detail: 'in progress', opacity: 1 },
        { repo: 'documents', kind: 'restore', icon: 'ki-cloud-download', iconBg: '#f5f3ff', iconColor: '#6d28d9', trigger: 'one-off', triggerIcon: 'ki-flash-circle', statusLabel: 'Rehydrating', statusColor: '#b45309', statusBg: '#fffbeb', statusIcon: 'ki-time', pct: 30, detail: 'in progress', opacity: 1 },
        { repo: 'music', kind: 'archive', icon: 'ki-cloud-add', iconBg: '#eff6ff', iconColor: '#3b82f6', trigger: 'schedule', triggerIcon: 'ki-calendar', statusLabel: 'Scheduled', statusColor: '#6d28d9', statusBg: '#f5f3ff', statusIcon: 'ki-calendar-tick', pct: 0, detail: 'next run 04 Jul 02:00', opacity: 1 },
        { repo: 'photos', kind: 'archive', icon: 'ki-cloud-add', iconBg: '#eff6ff', iconColor: '#3b82f6', trigger: 'schedule', triggerIcon: 'ki-calendar', statusLabel: 'Completed', statusColor: '#15803d', statusBg: '#f0fdf4', statusIcon: 'ki-check-circle', pct: 100, detail: 'finished 02 Jul 02:14', opacity: 0.66 },
        { repo: 'documents', kind: 'archive', icon: 'ki-cloud-add', iconBg: '#eff6ff', iconColor: '#3b82f6', trigger: 'one-off', triggerIcon: 'ki-flash-circle', statusLabel: 'Failed', statusColor: '#dc2626', statusBg: '#fef2f2', statusIcon: 'ki-cross-circle', pct: 61, detail: 'finished 01 Jul 17:40', opacity: 0.66 },
      ],
      consoleLines: [
        { ts: '14:02:18', color: '#86efac', text: '[photos] Uploaded chunk a3f29c…e1 (32.0 MB, Archive)' },
        { ts: '14:02:19', color: '#c4b5fd', text: '[photos] dedup 20240211_143121.jpg (already in repository)' },
        { ts: '14:02:21', color: '#86efac', text: '[photos] Uploaded chunk 77b0d4…9c (64.0 MB, Archive)' },
        { ts: '14:02:22', color: '#7dd3fc', text: '[documents] Rehydration status: 41 available, 173 pending' },
        { ts: '14:02:24', color: '#d4d4d8', text: '[photos] Sealing tar bundle (612 entries, 63.7 MB)' },
        { ts: '14:02:27', color: '#86efac', text: '[photos] Uploaded tar bundle f01e3a…22 (64.1 MB, Archive)' },
        { ts: '14:02:29', color: '#fcd34d', text: '[photos] warn  skipped ~$index-2023.xlsx.tmp (file locked)' },
        { ts: '14:02:31', color: '#7dd3fc', text: '[documents] Waiting for rehydration (Standard priority, ~13 h remaining)' },
        { ts: '14:02:33', color: '#86efac', text: '[photos] Uploaded chunk 2c91ff…08 (64.0 MB, Archive)' },
        { ts: '14:02:38', color: '#86efac', text: '[photos] Uploaded chunk 90aa17…4d (64.0 MB, Archive)' },
        { ts: '14:02:41', color: '#d4d4d8', text: '[photos] Hashing 20240302_090412.mp4' },
      ],
    };
  }
}
</script>
</body>
</html>
